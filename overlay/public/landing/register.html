<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="description" content="注册 FreeChina 账号" />
  <title>注册 · FreeChina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07090f;
      --card: rgba(16, 20, 34, 0.78);
      --border: rgba(255, 255, 255, 0.09);
      --text: #eef2ff;
      --muted: #94a3b8;
      --cyan: #22d3ee;
      --violet: #a78bfa;
      --danger: #fb7185;
      --ok: #34d399;
      --font: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --display: "Space Grotesk", "Inter", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 1.25rem;
      position: relative;
      overflow-x: hidden;
    }
    .mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(800px 480px at 15% 20%, rgba(167, 139, 250, 0.3), transparent 55%),
        radial-gradient(700px 420px at 85% 70%, rgba(34, 211, 238, 0.18), transparent 50%),
        radial-gradient(500px 300px at 50% 100%, rgba(244, 114, 182, 0.12), transparent 60%);
    }
    .shell {
      position: relative; z-index: 1;
      width: min(1000px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(10, 14, 24, 0.65);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      min-height: 560px;
    }
    .panel-left {
      padding: 2.5rem 2.2rem;
      background:
        linear-gradient(160deg, rgba(34, 211, 238, 0.1), transparent 40%),
        linear-gradient(20deg, rgba(167, 139, 250, 0.14), transparent 45%),
        rgba(12, 16, 28, 0.4);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--display); font-weight: 700; font-size: 1.1rem;
    }
    .brand-mark {
      width: 36px; height: 36px; border-radius: 11px;
      background: linear-gradient(135deg, #67e8f9, #a78bfa);
      color: #041016; display: grid; place-items: center; font-weight: 800; font-size: 13px;
      box-shadow: 0 0 24px rgba(34, 211, 238, 0.35);
    }
    .panel-left h1 {
      font-family: var(--display);
      font-size: clamp(1.7rem, 3vw, 2.2rem);
      line-height: 1.2; letter-spacing: -0.03em;
      margin: 2rem 0 0.8rem;
    }
    .panel-left h1 span {
      background: linear-gradient(120deg, #67e8f9, #c4b5fd 50%, #f9a8d4);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .panel-left .desc { color: var(--muted); font-size: 0.95rem; max-width: 30ch; }
    .bullets { list-style: none; margin-top: 1.8rem; display: grid; gap: 0.75rem; }
    .bullets li {
      display: flex; gap: 10px; align-items: flex-start;
      color: var(--muted); font-size: 0.9rem;
    }
    .bullets li i {
      width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
      display: grid; place-items: center; font-style: normal; font-size: 12px;
      background: rgba(52, 211, 153, 0.12); color: var(--ok);
      border: 1px solid rgba(52, 211, 153, 0.25);
    }
    .panel-right {
      padding: 2.4rem 2.2rem;
      display: flex; flex-direction: column; justify-content: center;
    }
    .panel-right h2 {
      font-family: var(--display); font-size: 1.55rem; letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }
    .sub {
      color: var(--muted); font-size: 0.9rem; margin-bottom: 1.6rem;
    }
    .sub a { color: var(--cyan); font-weight: 600; }
    .sub a:hover { text-decoration: underline; }
    form { display: grid; gap: 1rem; }
    .field label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: #cbd5e1; margin-bottom: 0.4rem;
    }
    .input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      padding: 0.9rem 1rem;
      font-size: 0.98rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
      font-family: inherit;
    }
    .input::placeholder { color: #64748b; }
    .input:focus {
      border-color: rgba(34, 211, 238, 0.45);
      box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }
    .row-between {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.85rem; color: var(--muted);
    }
    .row-between a { color: var(--violet); font-weight: 600; }
    .row-between a:hover { text-decoration: underline; }
    .btn {
      border: 0; cursor: pointer; font-family: inherit; font-weight: 700;
      border-radius: 14px; padding: 0.95rem 1rem; font-size: 1rem;
      transition: transform .15s, box-shadow .2s, opacity .2s;
    }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn-primary {
      color: #ffffff !important;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 55%, #9333ea 100%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 10px 30px rgba(124, 58, 237, 0.45);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      margin-top: 0.35rem;
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 12px 36px rgba(124, 58, 237, 0.55);
      filter: brightness(1.06);
    }
    .msg {
      display: none;
      padding: 0.75rem 0.9rem;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.45;
    }
    .msg.show { display: block; }
    .msg.err {
      background: rgba(251, 113, 133, 0.1);
      border: 1px solid rgba(251, 113, 133, 0.3);
      color: #fecdd3;
    }
    .msg.ok {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.28);
      color: #a7f3d0;
    }
    .back {
      margin-top: 1.4rem; text-align: center; font-size: 0.88rem; color: var(--muted);
    }
    .back a { color: var(--cyan); font-weight: 600; }
    .home-link {
      position: absolute; top: 1rem; left: 1rem; z-index: 2;
      color: var(--muted); font-size: 0.88rem; font-weight: 600;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.45rem 0.8rem; border-radius: 999px;
      border: 1px solid var(--border); background: rgba(7, 9, 15, 0.5);
      backdrop-filter: blur(8px);
    }
    .home-link:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }

    @media (max-width: 820px) {
      body { padding: 0.75rem; align-items: stretch; }
      .shell { grid-template-columns: 1fr; min-height: auto; }
      .panel-left { display: none; }
      .panel-right { padding: 2rem 1.35rem 1.75rem; }
      .home-link { position: static; margin: 0 0 1rem; width: fit-content; }
      .panel-right { padding-top: 0.5rem; }
      body { display: block; padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="mesh"></div>
  <a class="home-link" href="/">← 返回主站</a>

  <div class="shell">
    <aside class="panel-left">
      <div>
        <a class="brand" href="/">
          <span class="brand-mark">FC</span>
          <span>FreeChina</span>
        </a>
        <h1>开启旅程<br /><span>注册即用</span></h1>
        <p class="desc">创建账号后即可选购套餐、获取订阅链接，多端一键连接全球节点。</p>
        <ul class="bullets">
          <li><i>✓</i><span>邮箱注册，即刻开通</span></li>
          <li><i>✓</i><span>全球优质节点与加密隧道</span></li>
          <li><i>✓</i><span>支持多端同步使用</span></li>
        </ul>
      </div>
      <p style="color:var(--muted);font-size:0.8rem;margin-top:2rem">© FreeChina · free--china.com</p>
    </aside>

    <section class="panel-right">
      <h2>创建账号</h2>
      <p class="sub">已有账号？ <a href="/login">去登录</a></p>

      <div id="msg" class="msg" role="alert"></div>

      <form id="regForm" autocomplete="on">
        <div class="field">
          <label for="email">邮箱</label>
          <input class="input" id="email" name="email" type="email" required placeholder="name@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input class="input" id="password" name="password" type="password" required placeholder="至少 8 位密码" autocomplete="new-password" minlength="8" />
        </div>
        <div class="field">
          <label for="password2">确认密码</label>
          <input class="input" id="password2" name="password2" type="password" required placeholder="再次输入密码" autocomplete="new-password" minlength="8" />
        </div>
        <div class="field">
          <label for="invite">邀请码 <span style="color:var(--muted);font-weight:500">（如需要）</span></label>
          <input class="input" id="invite" name="invite_code" type="text" placeholder="选填，强制邀请时必填" autocomplete="off" />
        </div>
        <button class="btn btn-primary" id="submitBtn" type="submit">立即注册</button>
      </form>

      <p class="back">继续浏览？ <a href="/">返回官网首页</a></p>
    </section>
  </div>

  <script>
    (function () {
      const form = document.getElementById('regForm');
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      const STORAGE_KEY = 'VUE_NAIVE_ACCESS_TOKEN';

      function showMsg(text, type) {
        msg.textContent = text;
        msg.className = 'msg show ' + (type === 'ok' ? 'ok' : 'err');
      }
      function hideMsg() {
        msg.className = 'msg';
        msg.textContent = '';
      }

      function saveToken(authData) {
        const expireSec = 21600;
        const payload = {
          value: authData,
          time: Date.now(),
          expire: Date.now() + expireSec * 1000
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideMsg();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;
        const invite = document.getElementById('invite').value.trim();

        if (!email || !password) {
          showMsg('请输入邮箱和密码', 'err');
          return;
        }
        if (password.length < 8) {
          showMsg('密码至少 8 位', 'err');
          return;
        }
        if (password !== password2) {
          showMsg('两次输入的密码不一致', 'err');
          return;
        }

        btn.disabled = true;
        btn.textContent = '注册中…';

        try {
          const body = new URLSearchParams();
          body.set('email', email);
          body.set('password', password);
          if (invite) body.set('invite_code', invite);

          const res = await fetch('/api/v1/passport/auth/register', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              'Content-Language': 'zh-CN',
              'Accept': 'application/json'
            },
            body: body.toString()
          });

          const json = await res.json().catch(function () { return null; });
          if (!json) {
            showMsg('服务器响应异常，请稍后重试', 'err');
            return;
          }

          const data = json.data || json;
          const authData = (data && data.auth_data) || json.auth_data;

          if ((json.status === 'success' || res.ok) && authData) {
            saveToken(authData);
            showMsg('注册成功，正在进入用户中心…', 'ok');
            setTimeout(function () {
              location.href = '/dashboard';
            }, 400);
            return;
          }

          const errMsg = json.message || (json.error && String(json.error)) || '注册失败，请稍后重试';
          showMsg(errMsg, 'err');
        } catch (err) {
          showMsg('网络异常，请稍后重试', 'err');
        } finally {
          btn.disabled = false;
          btn.textContent = '立即注册';
        }
      });
    })();
  </script>
</body>
</html>
